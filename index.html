<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Julia Demartini</title>
</head>
<body style="background:#111; display:flex; flex-direction:column; align-items:center; gap:40px;">

  <!-- Primeiro SVG -->
  <div>
    <svg xmlns="http://www.w3.org/2000/svg" width="854" height="200" viewBox="0 0 854 200">
      <style>
        .text1 { font-size: 50px; font-weight: 700; font-family: Arial, sans-serif; }
        .desc1 { font-size: 18px; font-weight: 500; font-family: Arial, sans-serif; }
        .text1, .desc1 { animation: fadeIn 1.2s ease-in-out forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      </style>
      <defs>
        <linearGradient id="linear1" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#8B5CF6"/>
          <stop offset="30%" stop-color="#C026D3"/>
          <stop offset="70%" stop-color="#EC4899"/>
          <stop offset="100%" stop-color="#8B5CF6"/>
        </linearGradient>
      </defs>
      <rect width="854" height="200" fill="url(#linear1)" opacity="0.4"/>
      <text x="50%" y="35%" text-anchor="middle" alignment-baseline="middle" class="text1" fill="#fff">Julia Demartini</text>
      <text x="50%" y="55%" text-anchor="middle" alignment-baseline="middle" class="desc1" fill="#fff">Engenharia de Software | Cloud Enthusiast | Full Stack Student</text>
    </svg>
  </div>

  <!-- Segundo SVG -->
  <div>
    <svg xmlns="http://www.w3.org/2000/svg" width="854" height="120" viewBox="0 0 854 120">
      <style>
        .text2 { font-size: 70px; font-weight: 700; font-family: Arial, sans-serif; }
        .desc2 { font-size: 20px; font-weight: 500; font-family: Arial, sans-serif; }
        .text2, .desc2 { animation: fadeIn 1.2s ease-in-out forwards; }
      </style>
      <defs>
        <linearGradient id="linear2" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#00C9FF"/>
          <stop offset="100%" stop-color="#92FE9D"/>
        </linearGradient>
      </defs>
      <rect width="854" height="120" fill="url(#linear2)" opacity="0.4"/>
      <text x="50%" y="50%" text-anchor="middle" alignment-baseline="middle" class="text2" fill="#fff">Outro SVG</text>
    </svg>
  </div>

</body>
</html>
